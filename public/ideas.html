<html lang="en">
<head>
<script>(function(){try{if(localStorage.getItem("contento_theme")==="light")document.documentElement.setAttribute("data-theme","light")}catch(e){}})();</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<meta property="og:url" content="https://heycontento.com/ideas"/>
<meta property="og:image" content="https://heycontento.com/og-image.png"/>
<meta property="og:image:secure_url" content="https://heycontento.com/og-image.png"/>
<meta property="og:image:type" content="image/png"/>
<meta property="og:image:width" content="1200"/>

<meta name="twitter:title" content="Contento — Daily viral post ideas"/>
<meta name="twitter:description" content="Fresh viral post ideas, updated daily. Turn any idea into a ready-to-publish post."/>
<meta name="twitter:image" content="https://heycontento.com/og-image.png"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#fff;--ink-rgb:255,255,255;--bg-rgb:8,8,12;--bg:#08080c;--s1:#111114;--b1:rgba(var(--ink-rgb),0.06);--b2:rgba(var(--ink-rgb),0.12);--t1:var(--ink);--t2:rgba(var(--ink-rgb),0.6);--t3:rgba(var(--ink-rgb),0.35);--t4:rgba(var(--ink-rgb),0.18);--accent:#2563eb;--accent-l:#60a5fa;--green:#22c55e}
body{background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:99px}
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(var(--bg-rgb),0.82);backdrop-filter:blur(24px);border-bottom:1px solid var(--b1)}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-wordmark{font-size:18px;font-weight:900;letter-spacing:-.5px;color:var(--t1)}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-link{font-size:13px;font-weight:600;color:var(--t2);text-decoration:none;transition:color .15s}
.nav-link:hover{color:var(--ink)}
.wrap{max-width:1000px;margin:0 auto;padding:96px 20px 80px}
h1{font-size:clamp(26px,4vw,40px);font-weight:900;letter-spacing:-1px;margin-bottom:6px}
.sub{font-size:14px;color:var(--t3);margin-bottom:22px;max-width:600px;line-height:1.5}
.topbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.updated{font-size:12px;color:var(--t4)}
.refresh{margin-left:auto;background:rgba(var(--ink-rgb),0.05);border:1px solid var(--b2);border-radius:9px;padding:8px 14px;font-size:12px;font-weight:600;color:var(--t1);cursor:pointer;font-family:'Inter',sans-serif;position:relative}
.refresh:hover{background:rgba(var(--ink-rgb),0.09)}
.tip{position:absolute;bottom:calc(100% + 8px);right:0;background:#1c1c25;border:1px solid var(--b2);border-radius:9px;padding:8px 12px;font-size:11px;color:var(--t2);white-space:nowrap;box-shadow:0 12px 30px rgba(0,0,0,.5);display:none;z-index:50}
/* progress bar while ideas are being prepared */
.prep{display:none;margin:8px 0 22px}
.prep.show{display:block}
.prep-label{font-size:12.5px;color:var(--t3);margin-bottom:8px}
.prep-track{height:6px;background:rgba(var(--ink-rgb),0.06);border-radius:99px;overflow:hidden}
.prep-fill{height:100%;width:0%;background:linear-gradient(90deg,#2563eb,#60a5fa);border-radius:99px;transition:width .4s ease}
.tip.show{display:block}
.pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:22px}
.pill{flex-shrink:0;background:none;border:1px solid var(--b2);border-radius:99px;padding:7px 14px;font-size:12.5px;font-weight:600;color:var(--t2);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap}
.pill:hover{color:var(--t1)}
.pill.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:680px){.grid{grid-template-columns:1fr}}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:18px;padding:20px;position:relative;overflow:hidden;display:flex;flex-direction:column}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--ink-rgb),0.08),transparent)}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.b-plat{background:rgba(var(--ink-rgb),.05);color:var(--t2);border:1px solid var(--b1)}
.b-tone{background:rgba(var(--ink-rgb),.04);color:var(--t3);border:1px solid var(--b1)}
.headline{font-size:18px;font-weight:800;letter-spacing:-.3px;line-height:1.25;margin-bottom:9px}
.angle{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:9px}
.why{font-size:11.5px;font-style:italic;color:var(--t4);line-height:1.5;margin-bottom:11px}
.src{font-size:10.5px;color:var(--t4);margin-bottom:14px}
.acts{display:flex;gap:7px;flex-wrap:wrap;margin-top:auto}
.act{background:none;border:1px solid var(--b1);border-radius:8px;padding:7px 12px;font-size:11.5px;font-weight:600;color:var(--t3);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:5px;text-decoration:none}
.act:hover{border-color:var(--b2);color:var(--t1)}
.act.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.act.primary:hover{background:#1d4ed8}
.act.saved{border-color:rgba(34,197,94,.3);color:var(--green)}
.act.del:hover{border-color:rgba(239,68,68,.4);color:#f87171}
.skel{background:var(--s1);border:1px solid var(--b1);border-radius:18px;padding:20px}
.skel-ln{height:11px;border-radius:6px;background:linear-gradient(90deg,rgba(var(--ink-rgb),.04) 25%,rgba(var(--ink-rgb),.08) 50%,rgba(var(--ink-rgb),.04) 75%);background-size:200% 100%;animation:sh 1.4s infinite;margin-bottom:10px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.empty{text-align:center;padding:56px 20px;color:var(--t4)}
.empty button{margin-top:16px;background:var(--accent);border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:'Inter',sans-serif}
.section-h{font-size:18px;font-weight:800;letter-spacing:-.4px;margin:44px 0 16px}
html[data-theme="light"]{--bg:#f4f6f9;--bg-rgb:244,246,249;--s1:#ffffff;--s2:#eceff3;--ink:#0e0f16;--ink-rgb:14,15,22}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-brand">
    <svg width="34" height="34" viewBox="0 0 34 34" fill="none"><rect width="34" height="34" rx="9" fill="url(#lg)"/><defs><linearGradient id="lg" x1="0" y1="0" x2="34" y2="34" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient></defs><path d="M23 11.5a7 7 0 1 0 0 11" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/></svg>
    <span class="nav-wordmark">Contento</span>
  </a>
  <div class="nav-right">
    <span id="voiceBadgeSlot"></span>
    <a href="/" class="nav-link">Generator</a>
  </div>
</nav>

<div class="wrap">
  <h1>Daily Ideas</h1>
  <p class="sub">Fresh viral post ideas scraped from the internet every 24 hours. A rolling 30-day library — hundreds of ideas across every category, always growing.</p>

  <div class="topbar">
    <span class="updated" id="updated">Loading...</span>
    <button class="refresh" id="refreshBtn"><span id="refreshLabel">Refresh</span></button>
  </div>

  <div class="pills" id="pills"></div>

  <div class="prep" id="prep">
    <div class="prep-label" id="prepLabel">Scraping the internet and writing today's ideas...</div>
    <div class="prep-track"><div class="prep-fill" id="prepFill"></div></div>
  </div>

  <div id="content"></div>

  <div id="savedSection" style="display:none">
    <div class="section-h">Your Saved Ideas</div>
    <div class="grid" id="savedGrid"></div>
  </div>
</div>

<script src="/contento.js"></script>
<script>
const CATS=['All','Business','Marketing','Tech','Finance','Creator Economy','Health','Mindset','Productivity','Ecommerce','AI','Leadership']
const CAT_COLORS={Business:'#3b82f6',Marketing:'#a855f7',Tech:'#06b6d4',Finance:'#f59e0b','Creator Economy':'#ec4899',Health:'#14b8a6',Mindset:'#818cf8',Productivity:'#f97316',Ecommerce:'#f43f5e',AI:'#22c55e',Leadership:'#8b5cf6'}
const SAVED_KEY='contento_saved_ideas'
let ideas=[],filter='All',generatedAt=null

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escAttr(s){return String(s==null?'':s).replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function ago(iso){if(!iso)return 'unknown';const s=(Date.now()-Date.parse(iso))/1000;if(s<3600)return Math.max(1,Math.floor(s/60))+' min ago';if(s<86400)return Math.floor(s/3600)+' hours ago';return Math.floor(s/86400)+' days ago'}
function getSaved(){try{return JSON.parse(localStorage.getItem(SAVED_KEY)||'[]')}catch(e){return[]}}
function setSaved(a){localStorage.setItem(SAVED_KEY,JSON.stringify(a))}
function catBadge(cat){const c=CAT_COLORS[cat]||'#64748b';return `<span class="badge" style="background:${c}22;color:${c};border:1px solid ${c}55">${esc(cat||'Idea')}</span>`}

function renderPills(){
  document.getElementById('pills').innerHTML=CATS.map(c=>`<button class="pill${c===filter?' active':''}" data-c="${esc(c)}">${esc(c)}</button>`).join('')
  document.querySelectorAll('#pills .pill').forEach(b=>b.addEventListener('click',()=>{filter=b.dataset.c;renderPills();renderIdeas()}))
}

function ideaCard(it,saved){
  const savedIds=getSaved().map(x=>x.id)
  const isSaved=savedIds.includes(it.id)
  return `<div class="card">
    <div class="badges">
      ${catBadge(it.category)}
      ${it.suggested_platform?`<span class="badge b-plat">${esc(it.suggested_platform)}</span>`:''}
      ${it.suggested_tone?`<span class="badge b-tone">${esc(it.suggested_tone)}</span>`:''}
    </div>
    <div class="headline">${esc(it.headline)}</div>
    <div class="angle">${esc(it.angle)}</div>
    ${it.why_it_works?`<div class="why">${esc(it.why_it_works)}</div>`:''}
    <div class="src">Via ${esc(it.source_name||it.source||'the web')}</div>
    <div class="acts">
      <button class="act primary write-btn" data-id="${esc(it.id)}">Create post →</button>
      ${saved
        ? `<button class="act del remove-btn" data-id="${esc(it.id)}">Remove</button>`
        : `<button class="act save-btn${isSaved?' saved':''}" data-id="${esc(it.id)}">${isSaved?'Saved ✓':'Save idea'}</button>`}
      <button class="act rp-btn" data-h="${escAttr(it.headline)}">Repurpose →</button>
    </div>
  </div>`
}

function wireCards(scope){
  scope.querySelectorAll('.write-btn').forEach(b=>b.addEventListener('click',()=>{
    const it=findIdea(b.dataset.id);if(!it)return
    XL.openVariants({
      headline:it.headline,angle:it.angle,why_it_works:it.why_it_works,
      category:it.category,source:it.source_name||it.source||'',suggested_platform:it.suggested_platform||''
    })
  }))
  scope.querySelectorAll('.save-btn').forEach(b=>b.addEventListener('click',()=>{
    const it=findIdea(b.dataset.id);if(!it)return
    const arr=getSaved();if(arr.find(x=>x.id===it.id))return
    arr.push({id:it.id,headline:it.headline,angle:it.angle,category:it.category,source:it.source_name||it.source||'',savedAt:Date.now()})
    setSaved(arr);b.textContent='Saved ✓';b.classList.add('saved');renderSaved()
  }))
  scope.querySelectorAll('.remove-btn').forEach(b=>b.addEventListener('click',()=>{
    setSaved(getSaved().filter(x=>x.id!==b.dataset.id));renderSaved();renderIdeas()
  }))
  scope.querySelectorAll('.rp-btn').forEach(b=>b.addEventListener('click',()=>XL.openRepurpose(b.dataset.h)))
}
function findIdea(id){return ideas.find(x=>x.id===id)||getSaved().find(x=>x.id===id)}

function isFresh(it){return it.addedAt && (Date.now()-Date.parse(it.addedAt))<24*60*60*1000}
function renderIdeas(){
  const c=document.getElementById('content')
  if(!ideas.length){c.innerHTML=`<div class="empty">Ideas are being prepared. Check back in a few minutes.<br><button id="emptyRefresh">Refresh</button></div>`;const e=document.getElementById('emptyRefresh');if(e)e.addEventListener('click',()=>load(true));return}
  let rows=ideas
  if(filter!=='All')rows=rows.filter(i=>(i.category||'')===filter)
  if(!rows.length){c.innerHTML=`<div class="empty">No ideas in this category right now.</div>`;return}
  const fresh=rows.filter(isFresh), earlier=rows.filter(it=>!isFresh(it))
  let html=''
  if(fresh.length){
    html+=`<div class="section-h" style="margin-top:0">Fresh — last 24 hours <span style="color:var(--t4);font-weight:600;font-size:13px">(${fresh.length})</span></div>`
    html+='<div class="grid">'+fresh.map(it=>ideaCard(it,false)).join('')+'</div>'
  }
  if(earlier.length){
    html+=`<div class="section-h">Previous ideas <span style="color:var(--t4);font-weight:600;font-size:13px">· last 30 days (${earlier.length})</span></div>`
    html+='<div class="grid">'+earlier.map(it=>ideaCard(it,false)).join('')+'</div>'
  }
  c.innerHTML=html
  wireCards(c)
}
function renderSaved(){
  const saved=getSaved()
  const sec=document.getElementById('savedSection')
  if(!saved.length){sec.style.display='none';return}
  sec.style.display='block'
  const g=document.getElementById('savedGrid')
  g.innerHTML=saved.slice().reverse().map(it=>ideaCard(it,true)).join('')
  wireCards(g)
}

function showSkeletons(){
  document.getElementById('content').innerHTML='<div class="grid">'+Array(4).fill(0).map(()=>`<div class="skel"><div class="skel-ln" style="width:30%;height:9px;margin-bottom:14px"></div><div class="skel-ln" style="width:90%;height:16px"></div><div class="skel-ln" style="width:100%"></div><div class="skel-ln" style="width:80%"></div><div class="skel-ln" style="width:50%;margin-top:12px"></div></div>`).join('')+'</div>'
}

let prepTimer=null,prepPct=0,polls=0
function showPrep(on){
  const prep=document.getElementById('prep')
  if(on){
    prep.classList.add('show')
    if(!prepTimer){
      prepPct=8;document.getElementById('prepFill').style.width=prepPct+'%'
      prepTimer=setInterval(()=>{prepPct=Math.min(92,prepPct+Math.random()*9+3);document.getElementById('prepFill').style.width=prepPct+'%'},1200)
    }
  }else{
    if(prepTimer){clearInterval(prepTimer);prepTimer=null}
    document.getElementById('prepFill').style.width='100%'
    setTimeout(()=>{prep.classList.remove('show');document.getElementById('prepFill').style.width='0%'},400)
  }
}
async function fetchIdeas(){
  const r=await fetch('/api/ideas/daily');const d=await r.json()
  ideas=d.ideas||[];generatedAt=d.generatedAt
  return d
}
async function load(force){
  showSkeletons()
  polls=0
  try{
    const d=await fetchIdeas()
    if(ideas.length){
      document.getElementById('updated').textContent='Last updated '+ago(generatedAt)
      if(generatedAt)XL.markIdeasSeen(generatedAt)
      renderIdeas();renderSaved();return
    }
    // still preparing — show progress bar and poll (target < 30s for first batch)
    document.getElementById('updated').textContent='Preparing fresh ideas...'
    showPrep(true)
    const poll=async()=>{
      polls++
      try{ await fetchIdeas() }catch(e){}
      if(ideas.length){
        showPrep(false)
        document.getElementById('updated').textContent='Last updated '+ago(generatedAt)
        if(generatedAt)XL.markIdeasSeen(generatedAt)
        renderIdeas();renderSaved();return
      }
      if(polls>=24){ showPrep(false);renderIdeas();return } // ~72s safety stop
      setTimeout(poll,3000)
    }
    setTimeout(poll,3000)
  }catch(e){
    showPrep(false);document.getElementById('updated').textContent='';ideas=[];renderIdeas()
  }
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
document.getElementById('refreshBtn').addEventListener('click',async()=>{
  const lbl=document.getElementById('refreshLabel')
  lbl.textContent='Refreshing...'
  try{
    await fetchIdeas()
    if(!ideas.length){lbl.textContent='Refresh';return load(true)} // none yet → show progress + poll
    shuffle(ideas)  // resurface different ideas to the top each refresh
    document.getElementById('updated').textContent='Last updated '+ago(generatedAt)
    if(generatedAt)XL.markIdeasSeen(generatedAt)
    renderIdeas();renderSaved()
  }catch(e){}
  lbl.textContent='Refresh'
})

renderPills()
renderSaved()
load()
</script>
</body>
</html>
