<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){try{if(localStorage.getItem("xlink_theme")==="light")document.documentElement.setAttribute("data-theme","light")}catch(e){}})();</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>XLink — Your Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#fff;--ink-rgb:255,255,255;--bg-rgb:8,8,12;--bg:#08080c;--s1:#111114;--b1:rgba(var(--ink-rgb),0.06);--b2:rgba(var(--ink-rgb),0.12);--t1:var(--ink);--t2:rgba(var(--ink-rgb),0.6);--t3:rgba(var(--ink-rgb),0.35);--t4:rgba(var(--ink-rgb),0.18);--accent:#2563eb;--accent-l:#60a5fa;--green:#22c55e;--gold:#d4af37}
body{background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:99px}
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(var(--bg-rgb),0.82);backdrop-filter:blur(24px);border-bottom:1px solid var(--b1)}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-wordmark{font-size:18px;font-weight:900;letter-spacing:-.5px;color:var(--t1)}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-link{font-size:13px;font-weight:600;color:var(--t2);text-decoration:none;transition:color .15s}
.nav-link:hover{color:var(--ink)}
.wrap{max-width:920px;margin:0 auto;padding:96px 20px 80px}
h1{font-size:clamp(26px,4vw,40px);font-weight:900;letter-spacing:-1px;margin-bottom:6px}
.sub{font-size:14px;color:var(--t3);margin-bottom:28px}
/* stats row */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:34px}
@media(max-width:640px){.stats-row{grid-template-columns:1fr 1fr}}
.stat{background:var(--s1);border:1px solid var(--b1);border-radius:16px;padding:18px;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--ink-rgb),0.08),transparent)}
.stat-v{font-size:26px;font-weight:900;letter-spacing:-.5px;margin-bottom:3px}
.stat-l{font-size:11px;color:var(--t4);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
/* groups */
.group-title{font-size:13px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.06em;margin:30px 0 12px;display:flex;align-items:center;gap:8px}
.group-count{background:rgba(var(--ink-rgb),0.06);border-radius:99px;padding:1px 9px;font-size:11px;color:var(--t2)}
.post{background:var(--s1);border:1px solid var(--b1);border-radius:16px;padding:18px;margin-bottom:12px;position:relative}
.post.top{border-color:rgba(212,175,55,0.5);box-shadow:0 0 24px rgba(212,175,55,0.12)}
.top-badge{position:absolute;top:-9px;left:18px;background:var(--gold);color:#1a1400;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:99px}
.post-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.mp{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 8px;border-radius:99px;background:rgba(var(--ink-rgb),0.05);border:1px solid var(--b1);color:var(--t3)}
.post-text{font-size:13px;line-height:1.7;color:rgba(var(--ink-rgb),0.82);white-space:pre-wrap;margin-bottom:12px}
.perf{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.perf-pill{font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;background:rgba(37,99,235,0.1);border:1px solid rgba(37,99,235,0.2);color:var(--accent-l)}
.post-actions{display:flex;gap:8px}
.rp-btn{background:none;border:1px solid var(--b1);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600;color:var(--t3);cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.rp-btn:hover{border-color:var(--accent);color:var(--accent-l)}
.empty{text-align:center;padding:60px 20px;color:var(--t4)}
.empty a{color:var(--accent-l)}
/* insights */
.insights-head{font-size:18px;font-weight:800;letter-spacing:-.4px;margin:44px 0 6px}
.insights-summary{font-size:14px;color:var(--accent-l);background:rgba(37,99,235,0.08);border:1px solid rgba(37,99,235,0.2);border-radius:12px;padding:14px 16px;margin-bottom:20px;line-height:1.5}
.ins-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.ins-grid{grid-template-columns:1fr}}
.ins-card{background:var(--s1);border:1px solid var(--b1);border-radius:16px;padding:18px;position:relative;overflow:hidden}
.ins-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--ink-rgb),0.08),transparent)}
.ins-t{font-size:12px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
.bar-row{margin-bottom:11px}
.bar-row:last-child{margin-bottom:0}
.bar-head{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.bar-k{color:var(--t1);font-weight:600;text-transform:capitalize}
.bar-v{color:var(--t3)}
.bar-track{height:7px;background:rgba(var(--ink-rgb),0.05);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,#2563eb,#60a5fa);border-radius:99px;transition:width .5s}
.big-stat{font-size:34px;font-weight:900;letter-spacing:-1px;color:var(--ink)}
.big-stat-sub{font-size:12px;color:var(--t3);margin-top:2px}
.ins-lock{text-align:center;padding:40px 20px;color:var(--t4);font-size:14px;background:var(--s1);border:1px solid var(--b1);border-radius:16px}
/* clear */
.clear-bar{margin-top:48px;text-align:center}
.clear-btn{background:none;border:1px solid rgba(239,68,68,0.25);border-radius:10px;padding:9px 18px;font-size:12px;font-weight:600;color:#f87171;cursor:pointer;font-family:inherit;transition:all .15s}
.clear-btn:hover{background:rgba(239,68,68,0.08)}
html[data-theme="light"]{--bg:#f4f6f9;--bg-rgb:244,246,249;--s1:#ffffff;--s2:#eceff3;--ink:#0e0f16;--ink-rgb:14,15,22}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-brand">
    <svg width="34" height="34" viewBox="0 0 34 34" fill="none"><rect width="34" height="34" rx="9" fill="url(#lg)"/><defs><linearGradient id="lg" x1="0" y1="0" x2="34" y2="34" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient></defs><line x1="10" y1="10" x2="24" y2="24" stroke="white" stroke-width="3" stroke-linecap="round"/><line x1="24" y1="10" x2="10" y2="24" stroke="white" stroke-width="3" stroke-linecap="round"/><circle cx="10" cy="10" r="2.5" fill="white"/><circle cx="24" cy="24" r="2.5" fill="white"/><circle cx="24" cy="10" r="2.5" fill="white"/><circle cx="10" cy="24" r="2.5" fill="white"/><circle cx="17" cy="17" r="3.5" fill="none" stroke="rgba(var(--ink-rgb),0.5)" stroke-width="1.5"/></svg>
    <span class="nav-wordmark">XLink</span>
  </a>
  <div class="nav-right">
    <span id="voiceBadgeSlot"></span>
    <a href="/" class="nav-link">Generator</a>
  </div>
</nav>

<div class="wrap">
  <h1>Your results</h1>
  <p class="sub">Everything you have published, tracked, and what is working best.</p>
  <div id="content"></div>
</div>

<script src="/xlink.js"></script>
<script>
const PLAT={'x-post':'X Post','x-thread':'X Thread','linkedin':'LinkedIn'}
function platLabel(p){return PLAT[p]||p||'—'}
function num(n){n=Number(n)||0;return n>=1000?(n/1000).toFixed(1).replace(/\.0$/,'')+'K':String(n)}
const WD=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']

function render(){
  const posts=XL.getPosts()
  const c=document.getElementById('content')
  if(!posts.length){
    c.innerHTML=`<div class="empty">No posts tracked yet.<br><br>Generate posts and mark them as published to see your results here.<br><br><a href="/">Go to the generator →</a></div>`
    return
  }
  const published=posts.filter(p=>p.status==='published'||p.status==='edited')
  const skipped=posts.filter(p=>p.status==='skipped')
  const withImp=published.filter(p=>Number(p.impressions)>0)
  const avgImp=withImp.length?Math.round(withImp.reduce((s,p)=>s+Number(p.impressions),0)/withImp.length):0
  const bestImp=published.reduce((m,p)=>Math.max(m,Number(p.impressions)||0),0)
  const topId=(()=>{let id=null,best=-1;published.forEach(p=>{const v=Number(p.impressions)||0;if(v>best&&v>0){best=v;id=p.id}});return id})()

  let html=`<div class="stats-row">
    <div class="stat"><div class="stat-v">${published.length}</div><div class="stat-l">Published</div></div>
    <div class="stat"><div class="stat-v">${skipped.length}</div><div class="stat-l">Skipped</div></div>
    <div class="stat"><div class="stat-v">${avgImp?num(avgImp):'—'}</div><div class="stat-l">Avg impressions</div></div>
    <div class="stat"><div class="stat-v">${bestImp?num(bestImp):'—'}</div><div class="stat-l">Best post</div></div>
  </div>`

  html+=renderGroup('Published',posts.filter(p=>p.status==='published'),topId)
  html+=renderGroup('Edited & Published',posts.filter(p=>p.status==='edited'),topId)
  html+=renderGroup('Skipped',skipped,topId)

  html+=renderInsights(published,skipped)

  html+=`<div class="clear-bar"><button class="clear-btn" id="clearBtn">Clear all data</button></div>`
  c.innerHTML=html

  document.querySelectorAll('[data-rp]').forEach(b=>b.addEventListener('click',()=>{
    const p=posts.find(x=>x.id===b.dataset.rp); if(p)XL.openRepurpose(p.text)
  }))
  document.getElementById('clearBtn').addEventListener('click',()=>{
    if(confirm('Delete all tracked posts and results? This cannot be undone.')){XL.clearPosts();render()}
  })
}

function renderGroup(title,list,topId){
  if(!list.length)return ''
  let h=`<div class="group-title">${title}<span class="group-count">${list.length}</span></div>`
  list.slice().reverse().forEach(p=>{
    const isTop=p.id===topId
    const perf=[]
    if(Number(p.impressions)>0)perf.push(`${num(p.impressions)} impressions`)
    if(Number(p.likes)>0)perf.push(`${num(p.likes)} likes`)
    if(Number(p.reposts)>0)perf.push(`${num(p.reposts)} reposts`)
    if(Number(p.comments)>0)perf.push(`${num(p.comments)} comments`)
    h+=`<div class="post${isTop?' top':''}">
      ${isTop?'<div class="top-badge">Top Post</div>':''}
      <div class="post-meta">
        ${p.topic?`<span class="mp">${XL.esc(String(p.topic).slice(0,40))}</span>`:''}
        ${p.hook_type?`<span class="mp">${XL.esc(p.hook_type)}</span>`:''}
        ${p.tone?`<span class="mp">${XL.esc(p.tone)}</span>`:''}
        <span class="mp">${platLabel(p.platform)}</span>
      </div>
      <div class="post-text">${XL.esc(p.text)}</div>
      ${perf.length?`<div class="perf">${perf.map(x=>`<span class="perf-pill">${x}</span>`).join('')}</div>`:''}
      <div class="post-actions"><button class="rp-btn" data-rp="${p.id}">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        Repurpose</button></div>
    </div>`
  })
  return h
}

// ─── Insights (Feature 5) ─────────────────────────────────────────────────
function renderInsights(published,skipped){
  let h=`<div class="insights-head">Performance insights</div>`
  if(published.length<3){
    return h+`<div class="ins-lock">Publish 3 or more posts to unlock your performance insights.</div>`
  }
  const hasImp=published.some(p=>Number(p.impressions)>0)

  function groupRank(keyFn){
    const g={}
    published.forEach(p=>{const k=keyFn(p);if(!k)return;g[k]=g[k]||{sum:0,count:0};g[k].sum+=Number(p.impressions)||0;g[k].count++})
    const rows=Object.entries(g).map(([k,v])=>({k,avg:v.count?v.sum/v.count:0,count:v.count}))
    rows.sort((a,b)=>hasImp?(b.avg-a.avg):(b.count-a.count))
    return rows
  }
  function bars(rows,labelFn){
    if(!rows.length)return '<div class="bar-row" style="color:var(--t4);font-size:12px">No data yet</div>'
    const max=Math.max(...rows.map(r=>hasImp?r.avg:r.count),1)
    return rows.slice(0,5).map(r=>{
      const val=hasImp?r.avg:r.count
      const w=Math.round(val/max*100)
      const disp=hasImp?`${num(Math.round(r.avg))} avg`:`${r.count} post${r.count!==1?'s':''}`
      return `<div class="bar-row"><div class="bar-head"><span class="bar-k">${XL.esc(labelFn?labelFn(r.k):r.k)}</span><span class="bar-v">${disp}</span></div><div class="bar-track"><div class="bar-fill" style="width:${w}%"></div></div></div>`
    }).join('')
  }

  const hookRows=groupRank(p=>p.hook_type)
  const toneRows=groupRank(p=>p.tone)
  const platRows=groupRank(p=>p.platform)
  const topicRows=groupRank(p=>p.topic).slice(0,3)

  const bestHook=hookRows[0]?hookRows[0].k:'best'
  const bestTone=toneRows[0]?toneRows[0].k:'your'
  h+=`<div class="insights-summary">Your <b>${XL.esc(bestHook)}</b> hooks in <b>${XL.esc(bestTone)}</b> tone perform best. Post more of those.</div>`

  // win rate
  const totalDecided=published.length+skipped.length
  const winRate=totalDecided?Math.round(published.length/totalDecided*100):0

  // posting pattern
  const dayCount={}
  published.forEach(p=>{if(!p.timestamp)return;const d=new Date(p.timestamp).getDay();dayCount[d]=(dayCount[d]||0)+1})
  const dayRows=Object.entries(dayCount).map(([d,c])=>({k:WD[d],count:c})).sort((a,b)=>b.count-a.count)
  const maxDay=Math.max(...dayRows.map(r=>r.count),1)
  const dayBars=dayRows.length?dayRows.map(r=>`<div class="bar-row"><div class="bar-head"><span class="bar-k">${r.k}</span><span class="bar-v">${r.count} post${r.count!==1?'s':''}</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(r.count/maxDay*100)}%"></div></div></div>`).join(''):'<div style="color:var(--t4);font-size:12px">No data</div>'

  h+=`<div class="ins-grid">
    <div class="ins-card"><div class="ins-t">Best hook type</div>${bars(hookRows)}</div>
    <div class="ins-card"><div class="ins-t">Best tone</div>${bars(toneRows)}</div>
    <div class="ins-card"><div class="ins-t">Best platform</div>${bars(platRows,platLabel)}</div>
    <div class="ins-card"><div class="ins-t">Top topics</div>${bars(topicRows)}</div>
    <div class="ins-card"><div class="ins-t">Win rate</div><div class="big-stat">${winRate}%</div><div class="big-stat-sub">${published.length} published vs ${skipped.length} skipped</div></div>
    <div class="ins-card"><div class="ins-t">Posting pattern</div>${dayBars}</div>
  </div>`
  return h
}

render()
</script>
</body>
</html>
