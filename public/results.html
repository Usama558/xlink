<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){try{if(localStorage.getItem("contento_theme")==="light")document.documentElement.setAttribute("data-theme","light")}catch(e){}})();</script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Contento — Your Posts</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#fff;--ink-rgb:255,255,255;--bg-rgb:8,8,12;--bg:#08080c;--s1:#111114;--b1:rgba(var(--ink-rgb),0.06);--b2:rgba(var(--ink-rgb),0.12);--t1:var(--ink);--t2:rgba(var(--ink-rgb),0.6);--t3:rgba(var(--ink-rgb),0.35);--t4:rgba(var(--ink-rgb),0.18);--accent:#2563eb;--accent-l:#60a5fa;--green:#22c55e;--blue:#60a5fa}
body{background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:99px}
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(var(--bg-rgb),0.82);backdrop-filter:blur(24px);border-bottom:1px solid var(--b1)}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-wordmark{font-size:18px;font-weight:900;letter-spacing:-.5px;color:var(--t1)}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-link{font-size:13px;font-weight:600;color:var(--t2);text-decoration:none;transition:color .15s}
.nav-link:hover{color:var(--ink)}
.wrap{max-width:1000px;margin:0 auto;padding:96px 20px 80px}
h1{font-size:clamp(26px,4vw,40px);font-weight:900;letter-spacing:-1px;margin-bottom:6px}
.sub{font-size:14px;color:var(--t3);margin-bottom:24px}
/* filter + search */
.controls{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:22px;flex-wrap:wrap}
.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill-btn{background:rgba(var(--ink-rgb),0.04);border:1px solid var(--b1);border-radius:99px;padding:8px 15px;font-size:12.5px;font-weight:600;color:var(--t2);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.pill-btn:hover{border-color:var(--b2);color:var(--t1)}
.pill-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.search{background:rgba(var(--ink-rgb),0.04);border:1px solid var(--b1);border-radius:10px;padding:9px 13px;font-size:13px;color:var(--t1);font-family:'Inter',sans-serif;outline:none;width:260px;max-width:100%}
.search:focus{border-color:var(--accent)}
.search::placeholder{color:var(--t4)}
/* grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:680px){.grid{grid-template-columns:1fr}}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:18px;padding:18px;position:relative;overflow:hidden;display:flex;flex-direction:column}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--ink-rgb),0.08),transparent)}
.badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:11px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.b-published{background:rgba(34,197,94,.12);color:#86efac;border:1px solid rgba(34,197,94,.25)}
.b-edited{background:rgba(37,99,235,.14);color:var(--accent-l);border:1px solid rgba(37,99,235,.25)}
.b-skipped{background:rgba(var(--ink-rgb),.05);color:var(--t3);border:1px solid var(--b1)}
.b-unsaved{background:transparent;color:var(--t2);border:1px solid var(--b2)}
.b-plat{background:rgba(var(--ink-rgb),.05);color:var(--t2);border:1px solid var(--b1)}
.b-niche{background:rgba(var(--ink-rgb),.04);color:var(--t3);border:1px solid var(--b1)}
.topic{font-size:12px;color:var(--t3);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ptext{font-size:13.5px;line-height:1.65;color:rgba(var(--ink-rgb),0.82);white-space:pre-wrap;margin-bottom:6px}
.ptext.clamp{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.readmore{background:none;border:none;color:var(--accent-l);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;padding:0;margin-bottom:10px}
.date{font-size:11px;color:var(--t4);margin:4px 0 14px}
.actions{display:flex;gap:7px;margin-top:auto}
.act{background:none;border:1px solid var(--b1);border-radius:8px;padding:7px 12px;font-size:11.5px;font-weight:600;color:var(--t3);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.act:hover{border-color:var(--b2);color:var(--t1)}
.act.rp:hover{border-color:var(--accent);color:var(--accent-l)}
.act.del:hover{border-color:rgba(239,68,68,.4);color:#f87171}
.act.copied{border-color:rgba(34,197,94,.3);color:var(--green)}
.empty{text-align:center;padding:64px 20px;color:var(--t4)}
.empty a{color:var(--accent-l)}
.count{font-size:12px;color:var(--t4)}
html[data-theme="light"]{--bg:#f4f6f9;--bg-rgb:244,246,249;--s1:#ffffff;--s2:#eceff3;--ink:#0e0f16;--ink-rgb:14,15,22}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-brand">
    <svg width="34" height="34" viewBox="0 0 34 34" fill="none"><rect width="34" height="34" rx="9" fill="url(#lg)"/><defs><linearGradient id="lg" x1="0" y1="0" x2="34" y2="34" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient></defs><path d="M23 11.5a7 7 0 1 0 0 11" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/></svg>
    <span class="nav-wordmark">Contento</span>
  </a>
  <div class="nav-right">
    <span id="voiceBadgeSlot"></span>
    <a href="/" class="nav-link">Generator</a>
  </div>
</nav>

<div class="wrap">
  <h1>Your Posts</h1>
  <p class="sub">All content you have created. Reuse, repurpose, or copy anytime.</p>

  <div class="controls">
    <div class="pills" id="pills">
      <button class="pill-btn active" data-f="all">All</button>
      <button class="pill-btn" data-f="published">Published</button>
      <button class="pill-btn" data-f="edited">Edited</button>
      <button class="pill-btn" data-f="skipped">Skipped</button>
      <button class="pill-btn" data-f="unsaved">Unsaved</button>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="count" id="count"></span>
      <input class="search" id="search" placeholder="Search post text or topic..."/>
    </div>
  </div>

  <div id="content"></div>
</div>

<script src="/contento.js"></script>
<script>
const PLAT={'x-post':'X Post','x-thread':'X Thread','linkedin':'LinkedIn'}
const STATUS={published:'Published',edited:'Edited',skipped:'Skipped',unsaved:'Unsaved'}
let allPosts=[],filter='all',query=''

function platLabel(p){return PLAT[p]||p||'Post'}
function fmtDate(ts){const d=new Date(typeof ts==='number'?ts:Date.parse(ts));if(isNaN(d))return '';return d.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'})}
function statusKey(s){return STATUS[s]?s:'unsaved'}

async function load(){
  // localStorage first, then merge backend (cache-proof)
  const map={}
  XL.getPosts().forEach(p=>{if(p&&p.id)map[p.id]=p})
  const email=XL.getEmail()
  if(email){
    try{
      const backend=await XL.fetchProfilePosts(email)
      backend.forEach(p=>{if(p&&p.id&&!map[p.id])map[p.id]=p})
    }catch(e){}
  }
  allPosts=Object.values(map).sort((a,b)=>(Number(b.timestamp)||0)-(Number(a.timestamp)||0))
  render()
}

function render(){
  const c=document.getElementById('content')
  let rows=allPosts.slice()
  if(filter!=='all')rows=rows.filter(p=>statusKey(p.status)===filter)
  if(query){
    const q=query.toLowerCase()
    rows=rows.filter(p=>(p.text||'').toLowerCase().includes(q)||(p.topic||'').toLowerCase().includes(q))
  }
  document.getElementById('count').textContent=rows.length+' post'+(rows.length!==1?'s':'')
  if(!allPosts.length){
    c.innerHTML=`<div class="empty">No posts yet.<br><br>Every post you generate is saved here automatically.<br><br><a href="/">Create your first post →</a></div>`
    return
  }
  if(!rows.length){c.innerHTML=`<div class="empty">No posts match this filter.</div>`;return}

  c.innerHTML='<div class="grid">'+rows.map(p=>{
    const sk=statusKey(p.status)
    const long=(p.text||'').length>180
    return `<div class="card" data-id="${esc(p.id)}">
      <div class="badges">
        <span class="badge b-${sk}">${STATUS[sk]}</span>
        <span class="badge b-plat">${esc(platLabel(p.platform))}</span>
        ${p.niche?`<span class="badge b-niche">${esc(p.niche)}</span>`:''}
      </div>
      ${p.topic?`<div class="topic">Topic: ${esc(p.topic)}</div>`:''}
      <div class="ptext${long?' clamp':''}">${esc(p.text)}</div>
      ${long?'<button class="readmore">Read more</button>':''}
      <div class="date">${esc(fmtDate(p.timestamp))}</div>
      <div class="actions">
        <button class="act copy" data-text="${escAttr(p.text)}"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy</button>
        <button class="act rp" data-text="${escAttr(p.text)}"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>Repurpose</button>
        <button class="act del"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>Delete</button>
      </div>
    </div>`
  }).join('')+'</div>'

  // wire actions
  c.querySelectorAll('.readmore').forEach(b=>b.addEventListener('click',function(){
    const t=this.previousElementSibling
    if(t.classList.contains('clamp')){t.classList.remove('clamp');this.textContent='Show less'}
    else{t.classList.add('clamp');this.textContent='Read more'}
  }))
  c.querySelectorAll('.act.copy').forEach(b=>b.addEventListener('click',function(){
    navigator.clipboard.writeText(this.dataset.text).then(()=>{
      this.classList.add('copied');const o=this.innerHTML
      this.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Copied'
      setTimeout(()=>{this.classList.remove('copied');this.innerHTML=o},1800)
    })
  }))
  c.querySelectorAll('.act.rp').forEach(b=>b.addEventListener('click',function(){XL.openRepurpose(this.dataset.text)}))
  c.querySelectorAll('.act.del').forEach(b=>b.addEventListener('click',function(){
    const id=this.closest('.card').dataset.id
    if(!confirm('Delete this post from your library? This cannot be undone.'))return
    XL.deletePost(id)
    allPosts=allPosts.filter(p=>p.id!==id)
    render()
  }))
}

document.getElementById('pills').addEventListener('click',e=>{
  const b=e.target.closest('.pill-btn');if(!b)return
  document.querySelectorAll('.pill-btn').forEach(x=>x.classList.remove('active'))
  b.classList.add('active');filter=b.dataset.f;render()
})
document.getElementById('search').addEventListener('input',e=>{query=e.target.value.trim();render()})

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function escAttr(s){return String(s==null?'':s).replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

load()
</script>
</body>
</html>
