<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>XLink — Admin Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#08080c;--s1:#111114;--b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.12);--t1:#fff;--t2:rgba(255,255,255,0.6);--t3:rgba(255,255,255,0.35);--t4:rgba(255,255,255,0.18);--accent:#2563eb;--accent-h:#1d4ed8}
body{background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.glow{position:fixed;top:30%;left:50%;transform:translateX(-50%);width:500px;height:300px;background:radial-gradient(ellipse,rgba(37,99,235,0.14),transparent 70%);filter:blur(36px);pointer-events:none}
.wrap{position:relative;width:100%;max-width:380px}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:26px}
.logo span{font-size:20px;font-weight:900;letter-spacing:-.5px}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:20px;padding:30px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent)}
h1{font-size:22px;font-weight:900;letter-spacing:-.5px;margin-bottom:6px}
.sub{font-size:13px;color:var(--t3);margin-bottom:24px}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--b1);border-radius:11px;padding:11px 13px;font-size:14px;color:var(--t1);font-family:'Inter',sans-serif;outline:none;transition:border-color .15s;margin-bottom:16px}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--t4)}
.btn{width:100%;background:var(--accent);border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 0 24px rgba(37,99,235,.25)}
.btn:hover:not(:disabled){background:var(--accent-h);transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,.2);border-radius:9px;padding:10px 13px;font-size:13px;color:#fca5a5;margin-bottom:16px;display:none}
</style>
</head>
<body>
<div class="glow"></div>
<div class="wrap">
  <div class="logo">
    <svg width="32" height="32" viewBox="0 0 34 34" fill="none"><rect width="34" height="34" rx="9" fill="url(#lg)"/><defs><linearGradient id="lg" x1="0" y1="0" x2="34" y2="34" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient></defs><line x1="10" y1="10" x2="24" y2="24" stroke="white" stroke-width="3" stroke-linecap="round"/><line x1="24" y1="10" x2="10" y2="24" stroke="white" stroke-width="3" stroke-linecap="round"/><circle cx="10" cy="10" r="2.5" fill="white"/><circle cx="24" cy="24" r="2.5" fill="white"/><circle cx="24" cy="10" r="2.5" fill="white"/><circle cx="10" cy="24" r="2.5" fill="white"/><circle cx="17" cy="17" r="3.5" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/></svg>
    <span>XLink</span>
  </div>
  <div class="card">
    <h1>Admin Access</h1>
    <p class="sub">Restricted area. Authorized access only.</p>
    <div class="err" id="err"></div>
    <form id="form">
      <label class="lbl" for="email">Email</label>
      <input id="email" type="email" autocomplete="username" placeholder="admin@email.com" required/>
      <label class="lbl" for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required/>
      <button class="btn" id="btn" type="submit">
        <span class="spinner" id="spinner"></span>
        <span id="btnLabel">Enter Dashboard</span>
      </button>
    </form>
  </div>
</div>
<script>
const form=document.getElementById('form'),err=document.getElementById('err'),btn=document.getElementById('btn'),sp=document.getElementById('spinner'),lbl=document.getElementById('btnLabel')
form.addEventListener('submit',async e=>{
  e.preventDefault()
  err.style.display='none'
  btn.disabled=true;sp.style.display='block';lbl.textContent='Checking...'
  try{
    const r=await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value,password:document.getElementById('password').value})})
    const d=await r.json()
    if(r.ok&&d.ok){window.location.href='/admin';return}
    err.textContent=d.error||'Invalid credentials';err.style.display='block'
  }catch(e){err.textContent='Something went wrong. Try again.';err.style.display='block'}
  btn.disabled=false;sp.style.display='none';lbl.textContent='Enter Dashboard'
})
</script>
</body>
</html>
